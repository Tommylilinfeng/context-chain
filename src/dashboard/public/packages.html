<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKG — Packages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
.summary-bar {
  display: flex;
  gap: 24px;
  padding: 16px 20px;
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  margin-bottom: 24px;
  align-items: center;
  flex-wrap: wrap;
}
.summary-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.summary-stat .label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.summary-stat .value {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.summary-stat .value.accent { color: var(--accent); }
.summary-stat .value.green { color: var(--green); }

.top-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.top-controls .field { margin: 0; }
.top-controls select {
  min-width: 220px;
}

.pkg-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.pkg-card {
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  cursor: pointer;
  position: relative;
  animation: cardIn 0.3s ease both;
}
.pkg-card:hover {
  border-color: var(--border);
  box-shadow: var(--shadow-hover);
}
.pkg-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), 0 4px 16px rgba(77,142,255,0.1);
}

.pkg-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.pkg-card-header .pkg-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.pkg-card-header .pkg-name .root-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  background: var(--surface-2);
  padding: 2px 7px;
  border-radius: 3px;
}
.pkg-card-header input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

.pkg-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 14px;
}
.pkg-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.pkg-stat .num {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
}
.pkg-stat .lbl {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.pkg-bar-container {
  margin-bottom: 10px;
}
.pkg-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.pkg-bar-track {
  height: 6px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
}
.pkg-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.pkg-bar-fill.green { background: var(--green); }
.pkg-bar-fill.accent { background: var(--accent); }

.pkg-size-bar {
  margin-top: 10px;
}
.pkg-size-track {
  height: 4px;
  background: var(--surface-2);
  border-radius: 2px;
  overflow: hidden;
}
.pkg-size-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  opacity: 0.5;
  transition: width 0.4s ease;
}

.action-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.action-bar .select-actions {
  display: flex;
  gap: 8px;
  margin-left: auto;
}
</style>
</head>
<body>
<nav class="sidebar" id="sidebar"></nav>
<script src="/sidebar.js"></script>
<div class="main">
  <div class="page-hero">
    <h2>Packages</h2>
    <p class="subtitle">Structural code packages (top-level directories) from CPG data.</p>
  </div>
  <div class="content">

    <div class="top-controls">
      <div class="field">
        <label>Repository</label>
        <select id="repoSelect" onchange="loadPackages()">
          <option value="">Select a repo...</option>
        </select>
      </div>
    </div>

    <div class="summary-bar" id="summaryBar" style="display:none">
      <div class="summary-stat">
        <span class="label">Packages</span>
        <span class="value" id="sumPackages">0</span>
      </div>
      <div class="summary-stat">
        <span class="label">Total Files</span>
        <span class="value" id="sumFiles">0</span>
      </div>
      <div class="summary-stat">
        <span class="label">Total Functions</span>
        <span class="value" id="sumFunctions">0</span>
      </div>
      <div class="summary-stat">
        <span class="label">Selected</span>
        <span class="value accent" id="sumSelected">0</span>
      </div>
      <div class="action-bar" style="margin-left:auto">
        <div class="select-actions">
          <button class="btn-ghost" style="padding:6px 12px;font-size:12px" onclick="selectAll()">Select All</button>
          <button class="btn-ghost" style="padding:6px 12px;font-size:12px" onclick="selectNone()">Clear</button>
        </div>
        <button class="btn-primary" id="analyzeBtn" style="width:auto" onclick="analyzeSelected()" disabled>Analyze Selected</button>
      </div>
    </div>

    <div id="pkgLoading" class="loading" style="display:none">
      <div class="loading-spinner"></div>
      <div>Loading packages...</div>
    </div>

    <div id="pkgEmpty" style="display:none;text-align:center;padding:60px 20px;color:var(--text-dim)">
      <div style="font-size:14px">Select a repository above to view its packages.</div>
    </div>

    <div class="pkg-grid" id="pkgGrid"></div>

  </div>
</div>
<script>
function esc(s){return !s?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let packages = []
let selected = new Set()

// ── Load repo list ──────────────────────────────────
async function loadRepos() {
  try {
    const res = await fetch('/api/scan/config')
    const data = await res.json()
    const sel = document.getElementById('repoSelect')
    const repos = data.repos || data.config?.repos || []
    repos.forEach(r => {
      const opt = document.createElement('option')
      opt.value = r.name
      opt.textContent = r.name
      sel.appendChild(opt)
    })
  } catch (e) {
    console.error('Failed to load repos:', e)
  }
}

// ── Load packages for selected repo ─────────────────
async function loadPackages() {
  const repo = document.getElementById('repoSelect').value
  const grid = document.getElementById('pkgGrid')
  const loading = document.getElementById('pkgLoading')
  const empty = document.getElementById('pkgEmpty')
  const summary = document.getElementById('summaryBar')

  grid.innerHTML = ''
  packages = []
  selected.clear()
  updateSummary()

  if (!repo) {
    summary.style.display = 'none'
    empty.style.display = 'block'
    loading.style.display = 'none'
    return
  }

  empty.style.display = 'none'
  loading.style.display = 'block'
  summary.style.display = 'none'

  try {
    const res = await fetch('/api/packages/' + encodeURIComponent(repo))
    if (!res.ok) {
      const err = await res.json().catch(() => ({}))
      grid.innerHTML = '<div style="color:var(--red);padding:20px">' + esc(err.error || 'Failed to load packages') + '</div>'
      loading.style.display = 'none'
      return
    }
    const data = await res.json()
    packages = data.packages || []

    loading.style.display = 'none'
    summary.style.display = 'flex'
    renderGrid()
    updateSummary()
  } catch (e) {
    loading.style.display = 'none'
    grid.innerHTML = '<div style="color:var(--red);padding:20px">' + esc(e.message) + '</div>'
  }
}

// ── Render package cards ────────────────────────────
function renderGrid() {
  const grid = document.getElementById('pkgGrid')
  if (packages.length === 0) {
    grid.innerHTML = '<div style="color:var(--text-dim);padding:40px 0;text-align:center;grid-column:1/-1">No packages found in this repository.</div>'
    return
  }

  const maxFunctions = Math.max(...packages.map(p => p.functions), 1)

  grid.innerHTML = packages.map((pkg, i) => {
    const isRoot = pkg.name === '.' || pkg.name === '' || pkg.name === '(root)'
    const displayName = isRoot ? '(root)' : esc(pkg.name)
    const analyzedPct = pkg.functions > 0 ? Math.round((pkg.analyzed / pkg.functions) * 100) : 0
    const sizePct = Math.round((pkg.functions / maxFunctions) * 100)
    const isSelected = selected.has(pkg.name)

    return `<div class="pkg-card${isSelected ? ' selected' : ''}" data-pkg="${esc(pkg.name)}" onclick="togglePkg('${esc(pkg.name).replace(/'/g, "\\'")}')" style="animation-delay:${i * 30}ms">
      <div class="pkg-card-header">
        <span class="pkg-name">
          ${displayName}
          ${isRoot ? '<span class="root-label">repo root</span>' : ''}
        </span>
        <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation();togglePkg('${esc(pkg.name).replace(/'/g, "\\'")}')" aria-label="Select ${displayName}">
      </div>
      <div class="pkg-stats">
        <div class="pkg-stat">
          <span class="num">${pkg.files.toLocaleString()}</span>
          <span class="lbl">Files</span>
        </div>
        <div class="pkg-stat">
          <span class="num">${pkg.functions.toLocaleString()}</span>
          <span class="lbl">Functions</span>
        </div>
        <div class="pkg-stat">
          <span class="num" style="color:var(--green)">${pkg.analyzed.toLocaleString()}</span>
          <span class="lbl">Analyzed</span>
        </div>
      </div>
      <div class="pkg-bar-container">
        <div class="pkg-bar-label">
          <span>Analyzed</span>
          <span style="font-family:var(--mono);font-weight:600">${analyzedPct}%</span>
        </div>
        <div class="pkg-bar-track">
          <div class="pkg-bar-fill green" style="width:${analyzedPct}%"></div>
        </div>
      </div>
      <div class="pkg-size-bar">
        <div class="pkg-bar-label">
          <span>Relative size</span>
        </div>
        <div class="pkg-size-track">
          <div class="pkg-size-fill" style="width:${sizePct}%"></div>
        </div>
      </div>
    </div>`
  }).join('')
}

// ── Toggle package selection ────────────────────────
function togglePkg(name) {
  if (selected.has(name)) {
    selected.delete(name)
  } else {
    selected.add(name)
  }
  renderGrid()
  updateSummary()
}

function selectAll() {
  packages.forEach(p => selected.add(p.name))
  renderGrid()
  updateSummary()
}

function selectNone() {
  selected.clear()
  renderGrid()
  updateSummary()
}

// ── Update summary bar ──────────────────────────────
function updateSummary() {
  const totalFiles = packages.reduce((s, p) => s + p.files, 0)
  const totalFunctions = packages.reduce((s, p) => s + p.functions, 0)

  document.getElementById('sumPackages').textContent = packages.length.toLocaleString()
  document.getElementById('sumFiles').textContent = totalFiles.toLocaleString()
  document.getElementById('sumFunctions').textContent = totalFunctions.toLocaleString()
  document.getElementById('sumSelected').textContent = selected.size.toLocaleString()

  const btn = document.getElementById('analyzeBtn')
  btn.disabled = selected.size === 0
  btn.textContent = selected.size > 0 ? 'Analyze Selected (' + selected.size + ')' : 'Analyze Selected'
}

// ── Navigate to run page with selected packages ─────
function analyzeSelected() {
  if (selected.size === 0) return
  const repo = document.getElementById('repoSelect').value
  const params = new URLSearchParams()
  params.set('repo', repo)
  params.set('packages', Array.from(selected).join(','))
  window.location.href = '/run?'+ params.toString()
}

// ── Init ────────────────────────────────────────────
loadRepos()
document.getElementById('pkgEmpty').style.display = 'block'
</script>
</body>
</html>
