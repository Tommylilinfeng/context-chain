<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CKG — Concern Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<style>
/* ── Action Bar ────────────────────────────────── */
.action-bar {
  display: flex;
  gap: 12px;
  padding: 16px 40px;
  align-items: center;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-0);
}
.action-btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface-1);
  color: var(--text);
  font-size: 13px;
  font-family: var(--sans);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
}
.action-btn:hover { border-color: var(--accent); background: var(--accent-surface, rgba(77,142,255,0.08)); }
.action-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.action-btn.primary:hover { opacity: 0.9; }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.action-status { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

/* ── Stats Bar ─────────────────────────────────── */
.stats-bar {
  display: flex;
  gap: 2px;
  padding: 0 40px;
  margin-top: 20px;
}
.stat-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  font-family: var(--mono);
  background: var(--surface-1);
  border: 1px solid var(--border-subtle);
  cursor: default;
}
.stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-pill .count { font-size: 14px; font-weight: 700; }
.stat-pill .label { font-family: var(--sans); font-weight: 500; color: var(--text-secondary); font-size: 12px; }

/* ── Graph ─────────────────────────────────────── */
#cy {
  width: 100%;
  height: calc(100vh - 300px);
  min-height: 400px;
}

/* ── Empty State ───────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: calc(100vh - 300px);
  min-height: 400px;
  color: var(--text-dim);
  text-align: center;
  padding: 40px;
}
.empty-state h3 {
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 400;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.empty-state p {
  font-size: 13px;
  max-width: 360px;
  line-height: 1.6;
}

/* ── Detail Panel ──────────────────────────────── */
.detail-panel {
  position: fixed;
  top: 80px;
  right: 20px;
  width: 380px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 20px;
  display: none;
  z-index: 10;
}
.detail-panel.visible { display: block; }
.detail-panel .panel-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  padding: 4px;
  border-radius: 4px;
  transition: all var(--transition-fast);
}
.detail-panel .panel-close:hover { color: var(--text); background: var(--surface-2); }
.detail-panel h3 {
  font-family: var(--sans);
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 12px;
  padding-right: 24px;
  line-height: 1.4;
}
.detail-panel .panel-section {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border-subtle);
}
.detail-panel .panel-section-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  margin-bottom: 8px;
}
.detail-panel .panel-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ── Theme Tags ────────────────────────────────── */
.theme-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.theme-tag {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--mono);
  background: var(--surface-2);
  color: var(--text-secondary);
  border: 1px solid var(--border-subtle);
}

/* ── Layer Card ────────────────────────────────── */
.layer-card {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  margin-bottom: 8px;
}
.layer-card .layer-level {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.layer-card .layer-level.entry { color: var(--green); }
.layer-card .layer-level.logic { color: var(--accent); }
.layer-card .layer-level.infra { color: var(--purple); }
.layer-card .layer-fns {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.layer-card .layer-decisions {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
}

/* ── Risk Item ─────────────────────────────────── */
.risk-item {
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  background: rgba(255,107,107,0.05);
  border: 1px solid rgba(255,107,107,0.1);
  margin-bottom: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ── Legend Bar ─────────────────────────────────── */
.legend-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  padding: 14px 40px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--surface-0);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-family: var(--mono);
  color: var(--text-secondary);
}
.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar"></nav>

<div class="main">
  <div class="page-hero">
    <h2>Concern Analysis</h2>
    <p class="subtitle">Community detection reveals clusters of related design decisions</p>
  </div>

  <div class="action-bar">
    <button class="action-btn" id="detectBtn" onclick="runDetection()">Detect Communities</button>
    <button class="action-btn primary" id="analyzeBtn" onclick="runAnalysis()" disabled>Analyze Concerns</button>
    <span class="action-status" id="statusText"></span>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none"></div>
  <div class="legend-bar" id="legendBar" style="display:none"></div>

  <div class="empty-state" id="emptyState">
    <h3>No analysis yet</h3>
    <p>Click "Detect Communities" to run Louvain community detection on the decision graph, then "Analyze" to generate structured concern analysis with LLM.</p>
  </div>

  <!-- cy is always visible and sized, just empty until populated -->
  <div id="cy"></div>

  <div class="detail-panel" id="detailPanel">
    <button class="panel-close" onclick="closePanel()">&times;</button>
    <div id="panelContent"></div>
  </div>
</div>

<script src="/sidebar.js"></script>
<script>
(function() {
  var COLORS = ['#4d8eff', '#34d27b', '#a78bfa', '#22d3ee', '#f59e0b', '#f472b6', '#ef4444', '#6ee7b7', '#818cf8', '#fbbf24'];
  var cyInstance = null;

  window.runDetection = async function() {
    var detectBtn = document.getElementById('detectBtn');
    var analyzeBtn = document.getElementById('analyzeBtn');
    var statusText = document.getElementById('statusText');

    detectBtn.disabled = true;
    analyzeBtn.disabled = true;
    statusText.textContent = 'Detecting communities...';

    try {
      var res = await fetch('/api/concerns/detect');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();

      window.detectionData = data;
      var communities = data.communities || [];

      // Stats bar
      var totalDecisions = 0;
      for (var i = 0; i < communities.length; i++) {
        totalDecisions += (communities[i].decisions || []).length;
      }
      var statsBar = document.getElementById('statsBar');
      statsBar.innerHTML =
        '<div class="stat-pill"><div class="dot" style="background:var(--accent)"></div><span class="count">' + communities.length + '</span><span class="label">communities</span></div>' +
        '<div class="stat-pill"><div class="dot" style="background:var(--green)"></div><span class="count">' + totalDecisions + '</span><span class="label">decisions</span></div>' +
        '<div class="stat-pill"><div class="dot" style="background:var(--purple)"></div><span class="count">' + (data.edges || []).length + '</span><span class="label">edges</span></div>';
      statsBar.style.display = 'flex';

      // Legend bar with counts
      var legendBar = document.getElementById('legendBar');
      var legendHtml = '';
      for (var i = 0; i < communities.length; i++) {
        var decCount = (communities[i].decisions || []).length;
        legendHtml +=
          '<div class="legend-item">' +
            '<div class="legend-dot" style="background:' + COLORS[i % COLORS.length] + '"></div>' +
            'Community ' + (i + 1) + ' (' + decCount + ')' +
          '</div>';
      }
      legendBar.innerHTML = legendHtml;
      legendBar.style.display = 'flex';

      // Hide empty state, render graph
      document.getElementById('emptyState').style.display = 'none';
      renderGraph(data);

      analyzeBtn.disabled = false;
      statusText.textContent = 'Detection complete';
    } catch (e) {
      console.error('Detection failed:', e);
      statusText.textContent = 'Detection failed: ' + e.message;
      detectBtn.disabled = false;
    }
  };

  function renderGraph(data) {
    var communities = data.communities || [];
    var edges = data.edges || [];
    var elements = [];

    // Build a map of communityId -> index for coloring
    var cidToIdx = {};
    for (var i = 0; i < communities.length; i++) {
      cidToIdx[communities[i].communityId] = i;
    }

    // No compound nodes — just colored decision nodes
    for (var i = 0; i < communities.length; i++) {
      var c = communities[i];
      var color = COLORS[i % COLORS.length];
      var decisions = c.decisions || [];
      for (var j = 0; j < decisions.length; j++) {
        var d = decisions[j];
        elements.push({
          data: {
            id: d.id,
            label: (d.summary || '').slice(0, 40),
            color: color,
            communityId: c.communityId,
            ftype: d.findingType,
            fullData: d
          },
          classes: 'decision'
        });
      }
    }

    // Add invisible intra-community edges to pull same-community nodes together
    for (var i = 0; i < communities.length; i++) {
      var decisions = communities[i].decisions || [];
      if (decisions.length > 1) {
        // Connect each node to the first node in its community (star topology)
        var hub = decisions[0].id;
        for (var j = 1; j < decisions.length; j++) {
          elements.push({
            data: {
              id: 'intra-' + i + '-' + j,
              source: hub,
              target: decisions[j].id,
            },
            classes: 'intra'
          });
        }
      }
    }

    // Real decision-to-decision edges
    for (var e = 0; e < edges.length; e++) {
      var edge = edges[e];
      elements.push({
        data: {
          id: 'real-' + edge.source + '-' + edge.target,
          source: edge.source,
          target: edge.target,
          label: edge.type,
        },
        classes: 'real-edge'
      });
    }

    if (cyInstance) cyInstance.destroy();
    var cyEl = document.getElementById('cy');

    requestAnimationFrame(function() {
      cyInstance = cytoscape({
        container: cyEl,
        elements: elements,
        style: [
          { selector: 'node.decision', style: {
            'background-color': 'data(color)',
            'width': 18,
            'height': 18,
            'label': 'data(label)',
            'text-valign': 'bottom',
            'text-halign': 'center',
            'font-size': '8px',
            'font-family': '"JetBrains Mono", monospace',
            'color': '#949bae',
            'text-margin-y': 6,
            'text-max-width': '100px',
            'text-wrap': 'ellipsis',
          }},
          { selector: 'node.decision.analyzed', style: {
            'width': 22,
            'height': 22,
            'border-width': 2,
            'border-color': '#fff',
            'border-opacity': 0.3,
          }},
          { selector: 'edge.intra', style: {
            'line-color': '#2a2e38',
            'width': 0.5,
            'opacity': 0.15,
            'curve-style': 'haystack',
          }},
          { selector: 'edge.real-edge', style: {
            'line-color': '#5c6478',
            'target-arrow-color': '#5c6478',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier',
            'width': 1.5,
            'opacity': 0.6,
            'label': 'data(label)',
            'font-size': '8px',
            'font-family': '"JetBrains Mono", monospace',
            'color': '#5c6478',
            'text-rotation': 'autorotate',
            'text-margin-y': -8,
          }},
        ],
        layout: {
          name: 'cose',
          animate: false,
          fit: true,
          padding: 40,
          nodeRepulsion: function() { return 50000; },
          idealEdgeLength: function() { return 40; },
          edgeElasticity: function() { return 200; },
          gravity: 0.3,
          numIter: 1500,
          nodeDimensionsIncludeLabels: false,
          componentSpacing: 200,
        },
        minZoom: 0.1,
        maxZoom: 3,
      });

      // Click handlers
      cyInstance.on('tap', 'node.decision', function(evt) {
        showDecisionPanel(evt.target.data('fullData'));
      });
    });
  }

  window.runAnalysis = async function() {
    var detectBtn = document.getElementById('detectBtn');
    var analyzeBtn = document.getElementById('analyzeBtn');
    var statusText = document.getElementById('statusText');

    detectBtn.disabled = true;
    analyzeBtn.disabled = true;
    statusText.textContent = 'Starting analysis...';

    try {
      var res = await fetch('/api/concerns/analyze', { method: 'POST' });
      if (!res.ok) throw new Error('HTTP ' + res.status);

      // Listen to SSE stream for real-time progress
      await new Promise(function(resolve, reject) {
        var es = new EventSource('/api/concerns/stream');
        es.addEventListener('log', function(e) {
          try {
            var msg = JSON.parse(e.data);
            if (msg.type === 'progress') {
              statusText.textContent = msg.message;
            } else if (msg.type === 'done') {
              statusText.textContent = 'Analyzed ' + msg.analyzed + '/' + msg.total + ' communities (' + msg.skipped + ' singletons skipped)';
            } else if (msg.type === 'error') {
              statusText.textContent = 'Error: ' + msg.error;
            }
          } catch (_) {}
        });
        es.addEventListener('status', function(e) {
          es.close();
          if (e.data === 'done') resolve();
          else reject(new Error('Analysis ended with status: ' + e.data));
        });
        es.onerror = function() { es.close(); reject(new Error('SSE connection lost')); };
      });

      // Fetch final results
      var poll = await fetch('/api/concerns/results');
      var data = await poll.json();
      applyAnalysisResults(data);

      detectBtn.disabled = false;
      analyzeBtn.disabled = false;
    } catch (e) {
      console.error('Analysis failed:', e);
      statusText.textContent = 'Analysis failed: ' + e.message;
      detectBtn.disabled = false;
      analyzeBtn.disabled = false;
    }
  };

  function applyAnalysisResults(data) {
    window.analysisData = data;
    var concerns = data.concerns || [];

    for (var i = 0; i < concerns.length; i++) {
      var concern = concerns[i];
      var node = cyInstance.getElementById('community-' + concern.communityId);
      if (node && node.length) {
        node.data('label', concern.name || ('Community ' + (i + 1)));
        node.data('analysisData', concern);
      }
    }
    cyInstance.nodes('.decision').addClass('analyzed');

    // Update legend
    var legendBar = document.getElementById('legendBar');
    var html = '';
    for (var i = 0; i < concerns.length; i++) {
      var c = concerns[i];
      var count = (c.decisionIds || []).length;
      html +=
        '<div class="legend-item">' +
          '<div class="legend-dot" style="background:' + COLORS[i % COLORS.length] + '"></div>' +
          (c.name || 'Community ' + (i + 1)) + ' (' + count + ')' +
        '</div>';
    }
    legendBar.innerHTML = html;
  }

  function showDecisionPanel(d) {
    if (!d) return;
    var panel = document.getElementById('detailPanel');
    var content = document.getElementById('panelContent');

    var html = '<h3>' + esc(d.summary || d.id) + '</h3>';
    if (d.findingType) {
      html += '<div style="display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-family:var(--mono);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;background:var(--surface-2);color:var(--text-secondary);">' + esc(d.findingType) + '</div>';
    }
    if (d.content) {
      html += '<div class="panel-section"><div class="panel-section-title">Content</div><div class="panel-desc">' + esc(d.content) + '</div></div>';
    }
    var kw = d.keywords || [];
    if (kw.length) {
      html += '<div class="panel-section"><div class="panel-section-title">Keywords</div><div class="theme-tags">';
      for (var k = 0; k < kw.length; k++) html += '<span class="theme-tag">' + esc(kw[k]) + '</span>';
      html += '</div></div>';
    }
    if (d.anchorFile || d.anchorFunction) {
      var anchor = (d.anchorFile || '') + (d.anchorFunction ? '::' + d.anchorFunction : '');
      html += '<div class="panel-section"><div class="panel-section-title">Anchor</div><div class="panel-desc" style="font-family:var(--mono);font-size:12px;">' + esc(anchor) + '</div></div>';
    }
    content.innerHTML = html;
    panel.classList.add('visible');
  }

  function showCommunityPanel(communityId) {
    var panel = document.getElementById('detailPanel');
    var content = document.getElementById('panelContent');

    var concern = null;
    var ad = window.analysisData;
    if (ad) {
      var concerns = ad.concerns || ad;
      if (Array.isArray(concerns)) {
        for (var i = 0; i < concerns.length; i++) {
          if (String(concerns[i].communityId) === String(communityId)) { concern = concerns[i]; break; }
        }
      }
    }
    var community = null;
    if (window.detectionData && window.detectionData.communities) {
      for (var i = 0; i < window.detectionData.communities.length; i++) {
        if (String(window.detectionData.communities[i].communityId) === String(communityId)) { community = window.detectionData.communities[i]; break; }
      }
    }

    var html = '';
    if (concern) {
      html += '<h3>' + esc(concern.name || 'Community ' + communityId) + '</h3>';
      if (concern.description) html += '<div class="panel-desc">' + esc(concern.description) + '</div>';

      var themes = concern.keyThemes || concern.themes || [];
      if (themes.length) {
        html += '<div class="panel-section"><div class="panel-section-title">Key Themes</div><div class="theme-tags">';
        for (var t = 0; t < themes.length; t++) html += '<span class="theme-tag">' + esc(themes[t]) + '</span>';
        html += '</div></div>';
      }

      var layers = concern.layers || [];
      if (layers.length) {
        html += '<div class="panel-section"><div class="panel-section-title">Layers</div>';
        for (var l = 0; l < layers.length; l++) {
          var layer = layers[l];
          html += '<div class="layer-card"><div class="layer-level ' + esc((layer.level||'').toLowerCase()) + '">' + esc(layer.level || 'unknown') + '</div>';
          if (layer.functions && layer.functions.length) html += '<div class="layer-fns">' + esc(layer.functions.join(', ')) + '</div>';
          var ds = layer.decisionSummaries || layer.decisions || [];
          if (ds.length) html += '<div class="layer-decisions">' + esc(ds.join('; ')) + '</div>';
          html += '</div>';
        }
        html += '</div>';
      }

      var risks = concern.risks || [];
      if (risks.length) {
        html += '<div class="panel-section"><div class="panel-section-title">Risks</div>';
        for (var r = 0; r < risks.length; r++) html += '<div class="risk-item">' + esc(risks[r]) + '</div>';
        html += '</div>';
      }

      if (community) {
        html += '<div class="panel-section"><div class="panel-section-title">Decisions</div><div class="panel-desc">' + (community.decisions||[]).length + ' decisions in this community</div></div>';
      }
    } else {
      html += '<h3>Community ' + esc(String(communityId)) + '</h3>';
      if (community) {
        html += '<div class="panel-desc">' + (community.decisions||[]).length + ' decisions</div>';
        html += '<div class="panel-section"><div class="panel-desc" style="font-size:12px;color:var(--text-dim);">Run "Analyze Concerns" for detailed analysis.</div></div>';
      }
    }
    content.innerHTML = html;
    panel.classList.add('visible');
  }

  window.closePanel = function() {
    document.getElementById('detailPanel').classList.remove('visible');
  };

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
